openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Username/password authentication operations
  - name: monitoring
    description: Monitoring toggle operations
  - name: trackedUsers
    description: Tracked user list operations
  - name: settings
    description: Outbound request configuration (target URL, headers, cookies)
  - name: automationJobs
    description: >-
      Stored automation job configuration. Jobs are persisted for record-keeping
      only - nothing in this codebase schedules or executes them. Any real
      execution against a third-party site must be triggered manually by a
      user, the same way /settings/request-config/test works.
  - name: instagram
    description: Authenticated Instagram profile, media and explicit interaction operations
paths:
  /settings/request-config:
    get:
      operationId: getRequestConfig
      tags: [settings]
      summary: Get the saved outbound request configuration
      responses:
        "200":
          description: Request configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestConfig"
    put:
      operationId: updateRequestConfig
      tags: [settings]
      summary: Save the outbound request configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestConfigInput"
      responses:
        "200":
          description: Updated request configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestConfig"
  /settings/request-config/test:
    post:
      operationId: testRequestConfig
      tags: [settings]
      summary: Send a real request to the saved target URL using the saved headers/cookies and return the response
      responses:
        "200":
          description: Result of the test request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestConfigTestResult"
        "400":
          description: No target URL configured, or the request failed before a response was received
  /settings/request-config/history:
    get:
      operationId: getRequestRunHistory
      tags: [settings]
      summary: List past manually-triggered test requests
      description: >-
        Every entry was created by a user explicitly clicking "Test Et" on
        the settings page. Nothing in this codebase runs a test request on
        its own - there is no scheduler.
      responses:
        "200":
          description: Most recent test-request runs, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestRunLogEntry"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with a username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: >
            Invalid username or password, or Instagram two-factor authentication is
            required (twoFactorRequired: true; call /auth/verify-2fa next).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
  /auth/verify-2fa:
    post:
      operationId: verifyTwoFactor
      tags: [auth]
      summary: >
        Complete an Instagram login after /auth/login responded with
        twoFactorRequired: true, by submitting the code sent via SMS/TOTP or
        a backup code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTwoFactorRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Missing verification code, or no pending two-factor flow to complete
        "401":
          description: Verification code rejected by Instagram
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session. Idempotent - returns 204 even if not authenticated.
      responses:
        "204":
          description: Logged out (or already logged out)
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /automation-jobs:
    get:
      operationId: listAutomationJobs
      tags: [automationJobs]
      summary: List stored automation job configurations
      description: >-
        Read-only listing of persisted job configuration. No job in this list
        is ever executed automatically by the server.
      responses:
        "200":
          description: List of automation jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationJob"
    post:
      operationId: createAutomationJob
      tags: [automationJobs]
      summary: Save an automation job configuration
      description: >-
        Persists the job configuration only. Jobs are created with status
        "paused" and are never picked up by a scheduler - there is none in
        this codebase. A user must build/trigger any real execution
        explicitly elsewhere.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationJobInput"
      responses:
        "201":
          description: Created automation job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationJob"
  /automation-jobs/{jobId}:
    delete:
      operationId: deleteAutomationJob
      tags: [automationJobs]
      summary: Remove a stored automation job configuration
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /monitoring:
    get:
      operationId: getMonitoringStatus
      tags: [monitoring]
      summary: Get monitoring status
      responses:
        "200":
          description: Monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatus"
    patch:
      operationId: updateMonitoringStatus
      tags: [monitoring]
      summary: Enable or disable monitoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitoringUpdate"
      responses:
        "200":
          description: Updated monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatus"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [trackedUsers]
      summary: Get counts per category
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /tracked-users:
    get:
      operationId: listTrackedUsers
      tags: [trackedUsers]
      summary: List tracked users
      description: Returns tracked users, optionally filtered by category
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TrackedUserCategory"
      responses:
        "200":
          description: List of tracked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedUser"
    post:
      operationId: createTrackedUser
      tags: [trackedUsers]
      summary: Add a tracked user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackedUserInput"
      responses:
        "201":
          description: Created tracked user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedUser"
  /tracked-users/{id}:
    delete:
      operationId: deleteTrackedUser
      tags: [trackedUsers]
      summary: Remove a tracked user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /tracked-users/{id}/visit:
    post:
      operationId: recordTrackedUserVisit
      tags: [trackedUsers]
      summary: Record that the user opened this profile on Instagram themselves
      description: >-
        Called when a user clicks "Instagram'da Aç" in the panel, which opens
        the real Instagram profile in a new browser tab so the user can
        like/comment/view stories themselves. This just logs that the click
        happened (bumps interactionCount, sets lastInteractionAt to now) -
        it does not perform any action on Instagram; nothing in this
        codebase does.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated tracked user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedUser"
        "404":
          description: Tracked user not found
  /tracked-users/{id}/media:
    get:
      operationId: listTrackedUserMedia
      tags: [trackedUsers]
      summary: List liked media items for a tracked user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of liked media
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LikedMedia"
        "404":
          description: Tracked user not found
  /instagram/status:
    get:
      operationId: getInstagramStatus
      tags: [instagram]
      summary: Get the current Instagram client session status
      responses:
        "200":
          description: Instagram client status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramStatusResponse"
  /instagram/login:
    post:
      operationId: loginInstagram
      tags: [instagram]
      summary: Initialize the configured Instagram session
      responses:
        "200":
          description: Instagram session initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "502":
          description: Instagram authentication failed
  /instagram/logout:
    post:
      operationId: logoutInstagram
      tags: [instagram]
      summary: Close the active Instagram session
      responses:
        "200":
          description: Instagram session closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
  /instagram/profile/{username}:
    get:
      operationId: getInstagramProfile
      tags: [instagram]
      summary: Get an Instagram profile
      parameters:
        - $ref: "#/components/parameters/InstagramUsername"
      responses:
        "200":
          description: Instagram profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramProfileResponse"
        "502":
          description: Instagram request failed
  /instagram/posts/{username}:
    get:
      operationId: getInstagramPosts
      tags: [instagram]
      summary: Get recent Instagram posts
      parameters:
        - $ref: "#/components/parameters/InstagramUsername"
      responses:
        "200":
          description: Instagram posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramPostsResponse"
        "502":
          description: Instagram request failed
  /instagram/stories/{username}:
    get:
      operationId: getInstagramStories
      tags: [instagram]
      summary: Get active Instagram stories
      parameters:
        - $ref: "#/components/parameters/InstagramUsername"
      responses:
        "200":
          description: Instagram stories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramStoriesResponse"
        "502":
          description: Instagram request failed
  /instagram/reels/{username}:
    get:
      operationId: getInstagramReels
      tags: [instagram]
      summary: Get recent Instagram video posts and Reels
      parameters:
        - $ref: "#/components/parameters/InstagramUsername"
      responses:
        "200":
          description: Instagram Reels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramReelsResponse"
        "502":
          description: Instagram request failed
  /instagram/like-post:
    post:
      operationId: likeInstagramPost
      tags: [instagram]
      summary: Like one Instagram post after an explicit user action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramPostActionInput"
      responses:
        "200":
          description: Like request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/like-story:
    post:
      operationId: likeInstagramStory
      tags: [instagram]
      summary: Like one Instagram story after an explicit user action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramStoryActionInput"
      responses:
        "200":
          description: Like request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/like-reel:
    post:
      operationId: likeInstagramReel
      tags: [instagram]
      summary: Like one Instagram Reel after an explicit user action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramReelActionInput"
      responses:
        "200":
          description: Like request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/unlike-post:
    post:
      operationId: unlikeInstagramPost
      tags: [instagram]
      summary: Remove a like from an Instagram post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramPostActionInput"
      responses:
        "200":
          description: Unlike request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/unlike-reel:
    post:
      operationId: unlikeInstagramReel
      tags: [instagram]
      summary: Remove a like from an Instagram Reel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramReelActionInput"
      responses:
        "200":
          description: Unlike request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/story-seen:
    post:
      operationId: markInstagramStorySeen
      tags: [instagram]
      summary: Mark an Instagram story as seen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstagramStorySeenInput"
      responses:
        "200":
          description: Story marked as seen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramActionResponse"
        "400":
          description: Invalid request
        "502":
          description: Instagram rejected the request
  /instagram/media/{mediaId}/info:
    get:
      operationId: getInstagramMediaInfo
      tags: [instagram]
      summary: Get detailed metrics for a single media item
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Media info and metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstagramMediaInfoResponse"
        "502":
          description: Instagram request failed
components:
  parameters:
    InstagramUsername:
      name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    InstagramStatusResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
    InstagramActionResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
    InstagramProfile:
      type: object
      required: [username, pk, fullName]
      properties:
        username:
          type: string
        pk:
          type: string
        fullName:
          type: string
        profilePicUrl:
          type: string
        followerCount:
          type: integer
          description: Takipçi sayısı
        followingCount:
          type: integer
          description: Takip edilen sayısı
        mediaCount:
          type: integer
          description: Toplam gönderi sayısı
        biography:
          type: string
          description: Profil biyografisi
        externalUrl:
          type: string
          description: Profildeki dış bağlantı
        isPrivate:
          type: boolean
          description: Hesap gizli (private) ise true, açık (public) hesap ise false
    InstagramProfileResponse:
      type: object
      required: [success, profile]
      properties:
        success:
          type: boolean
        profile:
          $ref: "#/components/schemas/InstagramProfile"
    InstagramPost:
      type: object
      required: [id, mediaType, likeCount, hasLiked]
      properties:
        id:
          type: string
        code:
          type: string
        mediaType:
          type: integer
        caption:
          type: string
        likeCount:
          type: integer
        commentCount:
          type: integer
          description: Toplam yorum sayısı
        displayUrl:
          type: string
        videoUrl:
          type: string
        hasLiked:
          type: boolean
    InstagramPostsResponse:
      type: object
      required: [success, posts]
      properties:
        success:
          type: boolean
        posts:
          type: array
          items:
            $ref: "#/components/schemas/InstagramPost"
    InstagramStory:
      type: object
      required: [id, mediaType, timestamp]
      properties:
        id:
          type: string
        mediaType:
          type: integer
        thumbnailUrl:
          type: string
        videoUrl:
          type: string
        displayUrl:
          type: string
        timestamp:
          type: integer
          format: int64
    InstagramStoriesResponse:
      type: object
      required: [success, stories]
      properties:
        success:
          type: boolean
        stories:
          type: array
          items:
            $ref: "#/components/schemas/InstagramStory"
    InstagramReel:
      allOf:
        - $ref: "#/components/schemas/InstagramPost"
        - type: object
          required: [playCount, timestamp]
          properties:
            playCount:
              type: integer
              description: Toplam oynatma sayısı
            viewCount:
              type: integer
              description: Tekil izlenme sayısı
            timestamp:
              type: integer
              format: int64
    InstagramMediaInfo:
      type: object
      required: [id, likeCount, hasLiked, commentCount]
      description: Tekil medya istatistikleri (Media Info API)
      properties:
        id:
          type: string
        likeCount:
          type: integer
        hasLiked:
          type: boolean
        playCount:
          type: integer
          description: Reels/video oynatma sayısı
        viewCount:
          type: integer
          description: Standart video izlenme sayısı
        commentCount:
          type: integer
    InstagramMediaInfoResponse:
      type: object
      required: [success, info]
      properties:
        success:
          type: boolean
        info:
          $ref: "#/components/schemas/InstagramMediaInfo"
    InstagramStorySeenInput:
      type: object
      required: [storyId, ownerId]
      description: Hikayeyi "görüldü" olarak işaretle
      properties:
        storyId:
          type: string
          minLength: 1
          description: Hikayenin media_id değeri
        ownerId:
          type: string
          minLength: 1
          description: Hikaye sahibinin user_id değeri
        takenAt:
          type: integer
          description: Hikayenin taken_at Unix zaman damgası (sn)
    InstagramReelsResponse:
      type: object
      required: [success, reels]
      properties:
        success:
          type: boolean
        reels:
          type: array
          items:
            $ref: "#/components/schemas/InstagramReel"
    InstagramPostActionInput:
      type: object
      required: [postId]
      properties:
        postId:
          type: string
          minLength: 1
    InstagramStoryActionInput:
      type: object
      required: [storyId]
      properties:
        storyId:
          type: string
          minLength: 1
    InstagramReelActionInput:
      type: object
      required: [reelId]
      properties:
        reelId:
          type: string
          minLength: 1
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        lastRestart:
          type: string
          format: date-time
          description: When the current server process started.
      required:
        - status
        - lastRestart
    ActionType:
      type: string
      enum: [like, view_story, follow]
    AutomationJobInput:
      type: object
      required: [targetUsername, actionType, frequencyMinutes]
      properties:
        targetUsername:
          type: string
          minLength: 1
        actionType:
          $ref: "#/components/schemas/ActionType"
        frequencyMinutes:
          type: integer
          minimum: 15
          maximum: 1440
        randomizeDelay:
          type: boolean
          default: true
    AutomationJob:
      type: object
      required: [jobId, targetUsername, actionType, frequencyMinutes, randomizeDelay, status, nextRunAt, createdAt]
      properties:
        jobId:
          type: string
        targetUsername:
          type: string
        actionType:
          $ref: "#/components/schemas/ActionType"
        frequencyMinutes:
          type: integer
        randomizeDelay:
          type: boolean
        status:
          type: string
          enum: [active, paused, failed]
          description: Always created as "paused". Nothing in this codebase transitions it or runs the job.
        nextRunAt:
          type: string
          format: date-time
          description: Informational only (createdAt + frequencyMinutes) - not tied to any real scheduler.
        createdAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        deviceProfile:
          type: string
          description: Optional client-supplied device/browser identifier. Echoed back on login, not persisted or used server-side.
    LoginError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        twoFactorRequired:
          type: boolean
          description: True when Instagram requires a 2FA code — call /auth/verify-2fa next.
        twoFactorInfo:
          type: object
          additionalProperties: true
          description: Raw two_factor_info object from Instagram's login response.
        twoFactorIdentifier:
          type: string
        twoStepVerificationContext:
          type: string
          description: Opaque context required by the Bloks verification chain; passed through automatically server-side.
        isCaptcha:
          type: boolean
          description: True when the failure is a captcha/anti-bot/checkpoint challenge from Instagram rather than a wrong username or password.
        captchaType:
          type: string
          nullable: true
          description: Heuristic classification of the challenge (e.g. checkpoint, captcha, rate_limit, spam_or_abuse) when isCaptcha is true.
    VerifyTwoFactorRequest:
      type: object
      required: [verificationCode]
      properties:
        verificationCode:
          type: string
          minLength: 1
          description: 6-digit TOTP/SMS code, or 8-digit backup code.
        method:
          type: string
          enum: [totp, sms, backup_codes]
          default: totp
    AuthUser:
      type: object
      required: [id, username, sessionExpiry]
      properties:
        id:
          type: integer
        username:
          type: string
        sessionExpiry:
          type: string
          format: date-time
          description: When the current session cookie expires.
        deviceProfile:
          type: string
          nullable: true
          description: Optional client-supplied device/browser identifier, echoed back as received. Not used for anything server-side.
    MonitoringStatus:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    MonitoringUpdate:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    TrackedUserCategory:
      type: string
      enum: [follower, liked_post, liked_story, liked_reel]
    TrackedUser:
      type: object
      required: [id, username, fullName, avatarUrl, category, addedAt, interactionCount, autoLikeEnabled]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        category:
          $ref: "#/components/schemas/TrackedUserCategory"
        addedAt:
          type: string
          format: date-time
        lastInteractionAt:
          type: string
          format: date-time
          nullable: true
          description: Set manually via the API - nothing in this codebase writes to it automatically.
        interactionCount:
          type: integer
          description: Set manually via the API - nothing in this codebase increments it automatically.
        autoLikeEnabled:
          type: boolean
          description: Stored preference flag only - no automated liking exists in this codebase.
    TrackedUserInput:
      type: object
      required: [username, fullName, avatarUrl, category]
