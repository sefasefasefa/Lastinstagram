openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: monitoring
    description: Monitoring toggle operations
  - name: trackedUsers
    description: Tracked user list operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /monitoring:
    get:
      operationId: getMonitoringStatus
      tags: [monitoring]
      summary: Get monitoring status
      responses:
        "200":
          description: Monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatus"
    patch:
      operationId: updateMonitoringStatus
      tags: [monitoring]
      summary: Enable or disable monitoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitoringUpdate"
      responses:
        "200":
          description: Updated monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatus"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [trackedUsers]
      summary: Get counts per category
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /tracked-users:
    get:
      operationId: listTrackedUsers
      tags: [trackedUsers]
      summary: List tracked users
      description: Returns tracked users, optionally filtered by category
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TrackedUserCategory"
      responses:
        "200":
          description: List of tracked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedUser"
    post:
      operationId: createTrackedUser
      tags: [trackedUsers]
      summary: Add a tracked user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackedUserInput"
      responses:
        "201":
          description: Created tracked user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedUser"
  /tracked-users/{id}:
    delete:
      operationId: deleteTrackedUser
      tags: [trackedUsers]
      summary: Remove a tracked user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MonitoringStatus:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    MonitoringUpdate:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    TrackedUserCategory:
      type: string
      enum: [follower, liked_post, liked_story]
    TrackedUser:
      type: object
      required: [id, username, fullName, avatarUrl, category, addedAt]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        category:
          $ref: "#/components/schemas/TrackedUserCategory"
        addedAt:
          type: string
          format: date-time
    TrackedUserInput:
      type: object
      required: [username, fullName, avatarUrl, category]
      properties:
        username:
          type: string
          minLength: 1
        fullName:
          type: string
          minLength: 1
        avatarUrl:
          type: string
        category:
          $ref: "#/components/schemas/TrackedUserCategory"
    DashboardSummary:
      type: object
      required: [followerCount, likedPostCount, likedStoryCount, monitoringEnabled]
      properties:
        followerCount:
          type: integer
        likedPostCount:
          type: integer
        likedStoryCount:
          type: integer
        monitoringEnabled:
          type: boolean

