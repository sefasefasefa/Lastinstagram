          type: integer
        likedStoryCount:
          type: integer
        likedReelCount:
          type: integer
        monitoringEnabled:
          type: boolean
        rateLimitStatus:
          type: string
          enum: [safe, warning, critical]
          description: Static placeholder ("safe") - no real request-rate tracking exists in this codebase.
    RequestConfig:
      type: object
      required: [targetUrl, headers, cookies]
      properties:
        targetUrl:
          type: string
          nullable: true
        headers:
          type: object
          additionalProperties:
